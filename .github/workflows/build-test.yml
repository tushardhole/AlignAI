name: Build Test (Manual)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch/tag/commit)"
        required: false
        default: "master"

permissions:
  contents: read

concurrency:
  group: build-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
            target: dmg
          - os: macos-13
            arch: x86_64
            target: dmg
          - os: windows-latest
            arch: x64
            target: nsis
          - os: ubuntu-22.04
            arch: x86_64
            target: appimage
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0  # Fetch full history including tags for git describe
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev,packaging]"
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: >-
            playwright-${{ runner.os }}-${{ runner.arch }}-${{
            hashFiles('**/pyproject.toml') }}
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps
      - name: Build distributable
        run: python packaging/build.py --target ${{ matrix.target }}
      - name: Generate SHA256 checksum
        shell: bash
        run: |
          find dist-installers/ -type f \( -name "*.dmg" -o -name "*.exe" \
            -o -name "*.zip" -o -name "*.AppImage" \) \
            -exec sha256sum {} \; > dist-installers/SHA256SUMS.txt 2>/dev/null || true
      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.arch }}
          path: dist-installers/
          retention-days: 7
          if-no-files-found: warn
