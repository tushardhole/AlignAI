name: CI

on:
  pull_request:
  push:
    branches: [master]

# Minimal read-only permissions; jobs that need more elevate explicitly.
permissions:
  contents: read

# Cancel any in-flight run for the same ref when a new one is queued.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint: ruff format/lint + mypy + import-linter
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: ruff format check
        run: ruff format --check src tests scripts
      - name: ruff lint
        run: ruff check src tests scripts
      - name: mypy
        run: mypy
      - name: import-linter
        run: lint-imports

  # ---------------------------------------------------------------------------
  # Test matrix: ubuntu + macOS + Windows, Python 3.12
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests with coverage
        run: pytest -m "not integration" --cov --cov-report=xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Preflight: file-size limits + layer isolation + missing-tests gate
  # ---------------------------------------------------------------------------
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run preflight gate
        # --skip-missing-tests: Protocol method stubs in ports.py are public
        # symbols without test counterparts by design; the flag will be removed
        # once the application layer has full use-case test coverage.
        run: python scripts/preflight.py --skip-missing-tests

  # ---------------------------------------------------------------------------
  # Docs: markdownlint on all Markdown files
  # Mermaid block validation will be added when docs/ is scaffolded.
  # ---------------------------------------------------------------------------
  docs:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Lint Markdown files
        run: markdownlint "**/*.md" --ignore node_modules --ignore ".venv"
