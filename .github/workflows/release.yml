name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # never cancel an in-flight release

jobs:
  # ---------------------------------------------------------------------------
  # Build native distributable for each OS/arch target
  # Requires packaging/build.py (implemented in the packaging phase).
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
            target: dmg
          - os: ubuntu-22.04
            arch: x86_64
            target: appimage
          # macOS 13 (Intel) on hold - GitHub Actions runners often unavailable
          # (deprecated by Apple). Apple Silicon (macos-14) covers most users.
          # - os: macos-13
          #   arch: x86_64
          #   target: dmg
          # Windows builds are on hold until local Windows machine available for testing
          # - os: windows-latest
          #   arch: x64
          #   target: nsis
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # Fetch full history including tags for git describe
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev,packaging]"
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/pyproject.toml') }}
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps
      - name: Build distributable
        run: python packaging/build.py --target ${{ matrix.target }}
      - name: List output
        run: ls -lah dist-installers/ 2>/dev/null || echo "No dist-installers directory"
      - name: Generate SHA256 checksum
        shell: bash
        run: |
          find dist-installers/ -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.zip" -o -name "*.AppImage" \) \
            -exec sha256sum {} \; > dist-installers/SHA256SUMS.txt
      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.arch }}
          path: dist-installers/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Sign & notarize macOS builds (only when Apple signing secrets are present)
  # ---------------------------------------------------------------------------
  sign:
    name: Sign macOS (${{ matrix.arch }})
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64
          # macos-13 sign on hold (matches build matrix)
          # - os: macos-13
          #   arch: x86_64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.arch }}
          path: dist-installers/
      - name: Codesign and notarize
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          if [ -n "$APPLE_DEVELOPER_ID" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_TEAM_ID" ] && [ -n "$APPLE_APP_PASSWORD" ]; then
            python packaging/signer.py --artifacts dist-installers/
          else
            echo "⚠️  Apple signing secrets not configured, skipping codesign/notarize"
          fi
      - name: Re-upload signed artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.arch }}
          path: dist-installers/
          retention-days: 7
          overwrite: true

  # ---------------------------------------------------------------------------
  # SBOM generation
  # ---------------------------------------------------------------------------
  sbom:
    name: SBOM
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Publish GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: [build, sbom]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # needed to create the release
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/sbom.spdx.json
            artifacts/**/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: false

  # ---------------------------------------------------------------------------
  # SLSA build provenance attestation (Linux/Windows artifacts only;
  # macOS is covered by Apple notarization)
  # ---------------------------------------------------------------------------
  provenance:
    name: Provenance Attestation
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      attestations: write
      id-token: write
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/
          merge-multiple: true
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            artifacts/**/*.exe
            artifacts/**/*.AppImage
