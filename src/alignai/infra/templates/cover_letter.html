<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover Letter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
        }
        body {
            font-family: 'Calibri', 'Segoe UI', Arial, sans-serif;
            font-size: 11pt;
            line-height: 1.45;
            color: #2c3e50;
            background-color: white;
            padding: 1in 1in;
            page-break-after: avoid;
            orphans: 3;
            widows: 3;
        }
        .container {
            max-width: 6.5in;
            page-break-inside: avoid;
        }
        .date {
            margin-bottom: 0.25in;
            color: #34495e;
            font-size: 10.5pt;
        }
        .greeting {
            margin-bottom: 0.15in;
            margin-top: 0.15in;
        }
        .paragraph {
            margin-bottom: 0.12in;
            text-align: left;
            line-height: 1.45;
        }
        .closing-section {
            margin-top: 0.25in;
            page-break-inside: avoid;
        }
        .closing {
            margin-bottom: 0.02in;
        }
        .signature-name {
            font-weight: 600;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="date">{{ date }}</div>
        <div class="greeting">Dear Hiring Manager,</div>
        {% for paragraph in paragraphs %}
        <div class="paragraph">{{ paragraph }}</div>
        {% endfor %}
        <div class="closing-section">
            <div class="closing">Regards,</div>
            <div class="signature-name">{{ candidate_name }}</div>
        </div>
    </div>
</body>
</html>
